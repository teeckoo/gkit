# Build the mdbook site and deploy it to GitHub Pages.
# ONE-TIME SETUP (required): repo → Settings → Pages → Build and deployment →
# Source: "GitHub Actions". (Programmatic enablement isn't permitted for this repo,
# so it must be turned on in the UI once; then this workflow deploys on every push.)
name: docs
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/docs.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook
        run: |
          curl --proto '=https' --tlsv1.2 -LsSf \
            https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C /usr/local/bin
      - uses: actions/configure-pages@v5
      - run: mdbook build docs
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/book
      - id: deploy
        uses: actions/deploy-pages@v4
